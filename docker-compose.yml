version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: nestjs
    volumes:
      - /media/rei/volume/postgres_nestjs:/var/lib/postgresql/data
    ports:
      - '5433:5432'

volumes:
  postgres_nestjs:
